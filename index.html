<!doctype html>
<html lang="en">
     <head>
          <meta charset="UTF-8" />
          <meta
               name="viewport"
               content="width=device-width, initial-scale=1.0"
          />
          <title>Weather App</title>
          <link
               rel="stylesheet"
               href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
          />
          <link rel="stylesheet" href="style.css" />
     </head>
     <body>
          <main>
               <div class="card">
                    <div class="search">
                         <input
                              type="text"
                              placeholder="enter city name"
                              spellcheck="true" class="input-box"
                              />
                              <button>
                                   <i class="fa-solid fa-magnifying-glass" id="search-btn"></i>
                              </button>
                    </div>
                    <div class="weather">
                         <img src="images/rain.png" class="weather-icon" />
                         <h1 class="temp">(Temp)</h1>
                         <h2 class="city">(City Name)</h2>
                         <p class="description">(description)</p>
                         <div class="details">
                              <div class="col">
                                   <img src="images/humidity.png" class="humidity-img" />
                                   <div>
                                        <p>Humidity</p>
                                        <p class="humidity">(%)</p>
                                   </div>
                              </div>
                              <div class="col">
                                   <img src="images/wind.png" />
                                   <div>
                                        <p>Wind Speed</p>
                                        <p class="wind">(km/h)</p>
                                   </div>
                              </div>
                         </div>
                    </div>
               </div>

          </main>
          <script src="script.js"></script>
     </body>
</html>
